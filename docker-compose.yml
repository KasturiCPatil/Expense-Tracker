version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: expense_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: expensedb
      MYSQL_USER: expenseuser
      MYSQL_PASSWORD: expensepassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
